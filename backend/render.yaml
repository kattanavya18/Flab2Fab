services:
  - type: web
    name: flab2fab-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: HUGGINGFACE_API_KEY
        sync: false # Set manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*" # Set to your Vercel URL after frontend is deployed
